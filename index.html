<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Brown Noise</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="app">
      <button id="play-stop" class="play-stop" type="button" aria-pressed="false">Play</button>

      <div class="controls">
        <label class="control">
          <span class="control__label">Volume</span>
          <input id="volume" type="range" min="0" max="0.7" step="0.01" value="0.3" />
        </label>

        <label class="control">
          <span class="control__label">Darkness</span>
          <input id="tone" type="range" min="80" max="2000" step="10" value="500" />
        </label>

        <label class="control">
          <span class="control__label">Depth</span>
          <input id="color" type="range" min="0.98" max="0.999" step="0.001" value="0.99" />
        </label>

        <label class="control">
          <span class="control__label">Auto-off</span>
          <select id="timer">
            <option value="0">Off</option>
            <option value="15">15 min</option>
            <option value="30">30 min</option>
            <option value="60">60 min</option>
          </select>
        </label>
      </div>

      <p class="safety-hint">
        Keep the device well away from the crib and at a low volume — soft enough that you
        could comfortably hold a quiet conversation nearby.
      </p>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
